<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Typing | by mrpanha</title>

<meta property="og:title" content="Electronic Typing | Pro 2026" />
<meta property="og:description" content="High-precision Vaporwave typing simulator featuring Bento-HUD architecture." />
<meta property="og:type" content="website" />

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --vp-pink: #ff71ce;
    --vp-pink-15: rgba(255, 113, 206, 0.15); /* 15% Branding Glow */
    --vp-blue: #01cdfe;
    --vp-cyan: #05ffa1;
    --vp-purple: #b967ff;
    --vp-dark: #1a0033;
    --glass: rgba(26, 0, 51, 0.85);
  }

  * { box-sizing: border-box; }

  body {
    background-color: var(--vp-dark);
    color: white;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
  }

  /* VINTAGE VAPORWAVE SCENE */
.sky {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, #1a0033 0%, #4a0080 50%, #ff71ce 100%);
    z-index: -3;
  }

.sun {
    position: fixed;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    width: 380px; height: 380px;
    background: linear-gradient(to bottom, #ffea00 0%, #ff71ce 100%);
    border-radius: 50%;
    box-shadow: 0 0 100px rgba(255, 113, 206, 0.5);
    z-index: -2;
    -webkit-mask-image: linear-gradient(to bottom, 
      black 0%, black 15%, transparent 15%, transparent 18%,
      black 18%, black 35%, transparent 35%, transparent 40%,
      black 40%, black 60%, transparent 60%, transparent 68%,
      black 68%, black 85%, transparent 85%, transparent 95%
    );
  }

.grid-floor {
    position: fixed;
    bottom: -150px; left: -50%; width: 200%; height: 60%;
    background-image: 
      linear-gradient(transparent 0%, var(--vp-blue) 1px, transparent 1px),
      linear-gradient(90deg, transparent 0%, var(--vp-blue) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: rotateX(60deg);
    z-index: -1;
    animation: grid-move 2.5s linear infinite;
  }

  @keyframes grid-move {
    from { background-position: 0 0; }
    to { background-position: 0 60px; }
  }

.main-layout {
    width: 950px;
    position: relative;
    z-index: 10;
  }

  /* BRANDING & IDENTITY */
.branding {
    text-align: center;
    margin-bottom: 35px;
  }

.main-title {
    margin: 0;
    font-size: 4.2rem;
    font-weight: 900;
    color: white;
    text-transform: uppercase;
    letter-spacing: 12px;
    font-style: italic;
    /* Rule H: Subtle Glow shadow */
    text-shadow: 3px 3px 0px var(--vp-blue), 0 0 20px var(--vp-pink-15);
  }

.credit-text {
    text-align: right;
    font-size: 0.9rem;
    color: var(--vp-cyan);
    margin-top: -12px;
    padding-right: 40px;
    letter-spacing: 4px;
    font-weight: bold;
    text-shadow: 0 0 10px var(--vp-cyan);
    font-style: italic;
  }

  /* HUD-BENTO GLASS INTERFACE */
.bento-container {
    background: var(--glass);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    padding: 45px;
    border: 2px solid var(--vp-pink);
    box-shadow: 0 0 30px rgba(255, 113, 206, 0.3);
    position: relative;
  }

  /* HUD CARD CORNER BRACKETS */
.bento-container::before,.bento-container::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 3px solid var(--vp-cyan);
    pointer-events: none;
  }
.bento-container::before { top: -8px; left: -8px; border-right: 0; border-bottom: 0; }
.bento-container::after { bottom: -8px; right: -8px; border-left: 0; border-top: 0; }

.stats-hud {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
  }

.stat-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 12px 30px;
    border-radius: 12px;
    border-left: 4px solid var(--vp-blue);
  }

.stat-val { font-size: 1.6rem; font-weight: bold; color: var(--vp-cyan); display: block; }
.stat-lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }

.level-nav {
    display: flex;
    gap: 12px;
    margin-bottom: 35px;
  }

.lvl-btn {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(1, 205, 254, 0.4);
    color: var(--vp-blue);
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.75rem;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

.lvl-btn.active {
    background: var(--vp-blue);
    color: var(--vp-dark);
    font-weight: 900;
    box-shadow: 0 0 20px var(--vp-blue);
    transform: translateY(-2px);
  }

  /* SCROLLABLE VIEWPORT */
  #wordDisplay {
    font-size: 28px;
    line-height: 1.8;
    height: 220px;
    overflow-y: auto;
    color: rgba(255, 255, 255, 0.3);
    scroll-behavior: smooth;
    user-select: none;
    padding-right: 15px;
  }

  #wordDisplay::-webkit-scrollbar { width: 4px; }
  #wordDisplay::-webkit-scrollbar-thumb { background: var(--vp-pink); border-radius: 10px; }

.char { position: relative; transition: 0.1s; border-bottom: 2px solid transparent; }
.char.active { color: white; background: rgba(255, 113, 206, 0.2); }
.char.active::after {
    content: ''; position: absolute; left: 0; bottom: -2px; width: 100%; height: 3px;
    background: var(--vp-cyan); box-shadow: 0 0 15px var(--vp-cyan);
  }
.char.correct { color: white; opacity: 1; text-shadow: 0 0 8px var(--vp-blue); }
.char.incorrect { color: #ff0000; background: rgba(255, 0, 0, 0.15); border-bottom: 2px solid #ff0000; }

  #hiddenInput { position: absolute; opacity: 0; pointer-events: none; top: -100px; }

  /* HUD TERMINATION OVERLAY */
.results-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(26, 0, 51, 0.98);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 25px;
    z-index: 100;
  }

.wpm-final {
    font-size: 10rem;
    font-weight: 900;
    color: var(--vp-pink);
    text-shadow: 5px 5px 0px var(--vp-blue);
    margin: 0;
    line-height: 1;
  }

.action-group {
    display: flex;
    gap: 20px;
    margin-top: 40px;
  }

.btn-vapor {
    background: transparent;
    border: 2px solid var(--vp-blue);
    color: var(--vp-blue);
    padding: 18px 50px;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 900;
    letter-spacing: 2px;
    transition: 0.3s;
  }
.btn-vapor:hover { background: var(--vp-blue); color: var(--vp-dark); box-shadow: 0 0 25px var(--vp-blue); }

.btn-broadcast { border-color: #0088cc; color: #0088cc; }
.btn-broadcast:hover { background: #0088cc; color: white; }

</style>
</head>
<body>

<div class="sky"></div>
<div class="sun"></div>
<div class="grid-floor"></div>

<div class="main-layout">
  <div class="branding">
    <h1 class="main-title">Electronic Typing</h1>
    <div class="credit-text">by mrpanha</div>
  </div>

  <div class="bento-container">
    <div class="stats-hud">
      <div class="stat-card">
        <span class="stat-lbl">Uplink Time</span>
        <span id="timer" class="stat-val">0S</span>
      </div>
      <div class="stat-card">
        <span class="stat-lbl">Neural Sync</span>
        <span id="accuracyLive" class="stat-val">100%</span>
      </div>
    </div>

    <div class="level-nav">
      <button class="lvl-btn active" onclick="changeLevel('easy', this)">Level: 01</button>
      <button class="lvl-btn" onclick="changeLevel('medium', this)">Level: 02</button>
      <button class="lvl-btn" onclick="changeLevel('hard', this)">Level: 03</button>
      <button class="lvl-btn" onclick="changeLevel('veryHard', this)">Level: Elite</button>
    </div>

    <div id="wordDisplay">Establishing Connection...</div>
    <input type="text" id="hiddenInput" autocomplete="off" spellcheck="false" autofocus>

    <div class="results-overlay" id="resultsOverlay">
      <span style="color: var(--vp-cyan); letter-spacing: 8px; font-weight: 900;">DATA STREAM TERMINATED</span>
      <h1 class="wpm-final" id="wpmResult">0</h1>
      <p id="statsResult" style="color: white; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;"></p>
      <div class="action-group">
        <button class="btn-vapor" onclick="resetGame()">Initialize Restart</button>
        <button class="btn-vapor btn-broadcast" onclick="shareTelegram()">Broadcast Data</button>
      </div>
    </div>
  </div>
</div>

<script>
// Standardized corpora based on industrial frequency datasets [6]
const levelConfig = {
  easy: { words: ["the", "of", "to", "and", "a", "in", "is", "it", "you", "that", "he", "was", "for", "on", "are", "with", "as", "his", "they", "be", "at", "one", "have", "this", "from"], count: 25, time: 60 },
  medium: { words: ["system", "neural", "cyber", "grid", "data", "matrix", "core", "node", "access", "buffer", "stream", "packet", "proxy", "binary", "secure", "signal", "module", "logic", "flow", "unit", "sync", "link", "port", "disk", "chip"], count: 50, time: 110 },
  hard: { words: ["interface", "protocol", "encrypted", "mainframe", "velocity", "firewall", "terminal", "algorithm", "database", "sequence", "hardware", "software", "bandwidth", "frequency", "overload", "uplink", "bypass", "latency", "spectrum", "circuit", "decrypt", "backdoor", "payload", "compiler", "network"], count: 50, time: 110 },
  veryHard: { words: ["synchronization", "multidimensional", "cryptographic", "extraordinary", "vulnerability", "optimization", "infrastructure", "transmission", "parallelization", "authentication", "bioluminescence", "architecture", "decentralization", "neuroplasticity", "reconfiguration", "superconductivity", "microprocessor", "nanotechnology", "telecommunication", "interconnectivity"], count: 50, time: 110 }
};

let currentLevel = 'easy', timeLeft, timerId = null, testStarted = false, charIndex = 0, mistakes = 0, totalKeystrokes = 0, startTime = 0;
const wordDisplay = document.getElementById("wordDisplay"), hiddenInput = document.getElementById("hiddenInput"), timerDisplay = document.getElementById("timer"), accuracyDisplay = document.getElementById("accuracyLive"), resultsOverlay = document.getElementById("resultsOverlay");

function changeLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetGame();
}

function initWords() {
  wordDisplay.innerHTML = "";
  let fullText = "";
  const config = levelConfig[currentLevel];
  timeLeft = config.time;
  timerDisplay.innerText = timeLeft + "S";
  for (let i = 0; i < config.count; i++) {
    fullText += config.words[Math.floor(Math.random() * config.words.length)] + (i === config.count - 1? "" : " ");
  }
  fullText.split("").forEach(char => {
    const span = document.createElement("span");
    span.classList.add("char");
    span.innerText = char;
    wordDisplay.appendChild(span);
  });
  wordDisplay.querySelector(".char").classList.add("active");
  wordDisplay.scrollTop = 0;
  hiddenInput.focus();
}

function startTimer() {
  startTime = performance.now(); // High-resolution monotonic timing [1]
  timerId = setInterval(() => {
    timeLeft--;
    timerDisplay.innerText = timeLeft + "S";
    if (timeLeft <= 0) endGame(); 
  }, 1000);
}

// Side-Cannon Confetti Logic
function triggerCelebration() {
  const count = 200;
  const defaults = { origin: { y: 0.8 }, zIndex: 1000 };
  function fire(particleRatio, opts) {
    confetti({...defaults,...opts, particleCount: Math.floor(count * particleRatio) });
  }
  fire(0.25, { spread: 26, startVelocity: 60, origin: { x: 0 }, colors: ['#ff71ce', '#01cdfe'] });
  fire(0.25, { spread: 26, startVelocity: 60, origin: { x: 1 }, colors: ['#ff71ce', '#01cdfe'] });
}

function endGame() {
  clearInterval(timerId);
  const timeInMinutes = (performance.now() - startTime) / 60000;
  const grossWPM = totalKeystrokes > 0? Math.round((totalKeystrokes / 5) / timeInMinutes) : 0;
  const accuracy = totalKeystrokes > 0? Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100) : 100;
  
  document.getElementById("wpmResult").innerText = grossWPM;
  document.getElementById("statsResult").innerText = `Accuracy: ${accuracy}% | Errors: ${mistakes} | Node: ${currentLevel.toUpperCase()}`;
  resultsOverlay.style.display = "flex";
  triggerCelebration();
}

hiddenInput.addEventListener("input", (e) => {
  if (!e.isTrusted) return; // Anti-cheat
  if (!testStarted) { testStarted = true; startTimer(); }

  const characters = wordDisplay.querySelectorAll(".char");
  const typedChar = hiddenInput.value.slice(-1);
  const currentChar = characters[charIndex].innerText;

  if (typedChar === currentChar) {
    characters[charIndex].classList.add("correct");
  } else {
    characters[charIndex].classList.add("incorrect");
    mistakes++;
  }

  characters[charIndex].classList.remove("active");
  charIndex++; totalKeystrokes++;

  if (charIndex < characters.length) {
    const nextChar = characters[charIndex];
    nextChar.classList.add("active");
    // Auto-scroll logic [7]
    if (nextChar.offsetTop > (wordDisplay.scrollTop + wordDisplay.offsetHeight - 80)) {
        wordDisplay.scrollTop = nextChar.offsetTop - 80;
    }
  } else {
    endGame(); // Early Termination Protocol 
  }

  accuracyDisplay.innerText = Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100) + "%";
  hiddenInput.value = "";
});

// Telegram API distribution
function shareTelegram() {
  const wpm = document.getElementById("wpmResult").innerText;
  const acc = accuracyDisplay.innerText;
  const text = encodeURIComponent(`Electronic Typing [${currentLevel.toUpperCase()}]: ${wpm} WPM | ${acc} Accuracy! by mrpanha`);
  window.open(`https://t.me/share/url?url=${window.location.href}&text=${text}`, '_blank');
}

function resetGame() {
  clearInterval(timerId);
  charIndex = 0; mistakes = 0; totalKeystrokes = 0; testStarted = false;
  resultsOverlay.style.display = "none";
  accuracyDisplay.innerText = "100%";
  initWords();
}

document.addEventListener("click", () => { if(resultsOverlay.style.display!== "flex") hiddenInput.focus(); });
window.onload = initWords;
</script>
</body>
</html>
