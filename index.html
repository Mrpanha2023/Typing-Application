<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronic Typing | by mrpanha</title>

<meta property="og:title" content="Electronic Typing | Pro 2026" />
<meta property="og:description" content="Immersive HUD-Bento typing simulator with high-precision metrics. Designed by mrpanha." />
<meta property="og:type" content="website" />

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --neon-pink: #FF33CC;
    --neon-pink-glow: rgba(255, 51, 204, 0.15); /* Rule H: 15% branding glow */
    --electric-blue: #00CCFF;
    --deep-purple: #26004D;
    --dark-navy: #0A001F;
    --cyan-glow: #66FFFF;
    --glass: rgba(10, 0, 31, 0.85);
  }

  * { box-sizing: border-box; }

  body {
    background-color: var(--dark-navy);
    color: white;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Rule L: ANIMATED HUD BACKGROUND */
 .bg-grid {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
      linear-gradient(var(--deep-purple) 1px, transparent 1px),
      linear-gradient(90deg, var(--deep-purple) 1px, transparent 1px);
    background-size: 50px 50px;
    background-position: center;
    z-index: -2;
    animation: grid-scroll 20s linear infinite;
  }

 .scanlines {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
    background-size: 100% 4px, 3px 100%;
    pointer-events: none;
    z-index: 100;
  }

  @keyframes grid-scroll {
    from { transform: translateY(0); }
    to { transform: translateY(50px); }
  }

 .main-layout {
    width: 900px;
    position: relative;
    z-index: 10;
  }

  /* Rule H: Visual Identity and Attribution */
 .branding-wrapper {
    text-align: center;
    margin-bottom: 25px;
  }

 .main-title {
    margin: 0;
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--neon-pink);
    text-transform: uppercase;
    letter-spacing: 10px;
    text-shadow: 0 0 15px var(--neon-pink-glow), 0 0 30px var(--neon-pink-glow);
  }

 .credit-text {
    text-align: right;
    font-size: 0.9rem;
    color: var(--cyan-glow);
    font-style: italic;
    margin-top: -10px;
    padding-right: 20px;
    letter-spacing: 2px;
  }

  /* Rule L: BENTO CARD CONTAINER */
 .bento-container {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 40px;
    border: 1px solid rgba(102, 255, 255, 0.2);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    position: relative;
  }

  /* HUD CORNERS */
 .bento-container::before,.bento-container::after {
    content: '';
    position: absolute;
    width: 30px; height: 30px;
    border: 2px solid var(--electric-blue);
    pointer-events: none;
  }
 .bento-container::before { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
 .bento-container::after { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

 .stats-hud {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
  }

 .stat-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 15px 25px;
    border-radius: 15px;
    border-left: 3px solid var(--electric-blue);
  }

 .stat-value {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--cyan-glow);
    display: block;
  }

 .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--electric-blue);
    letter-spacing: 2px;
  }

 .level-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
  }

 .lvl-btn {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(0, 204, 255, 0.3);
    color: white;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.75rem;
    transition: 0.3s ease;
  }

 .lvl-btn.active {
    background: var(--electric-blue);
    color: var(--dark-navy);
    font-weight: bold;
    box-shadow: 0 0 20px rgba(0, 204, 255, 0.4);
  }

  /* Rule G: Viewport Adaptation [1, 2] */
  #wordDisplay {
    font-size: 26px;
    line-height: 1.8;
    height: 220px;
    overflow-y: auto;
    padding-right: 20px;
    color: rgba(255,255,255,0.4);
    scroll-behavior: smooth;
    user-select: none;
  }

  #wordDisplay::-webkit-scrollbar { width: 4px; }
  #wordDisplay::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 10px; }

  /* Following Caret Logic [3, 4, 5] */
 .char { position: relative; transition: 0.1s; border-bottom: 2px solid transparent; }
 .char.active { color: white; background: rgba(255, 51, 204, 0.2); }
 .char.active::after {
    content: ''; position: absolute; left: 0; bottom: -2px; width: 100%; height: 3px;
    background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink);
  }
 .char.correct { color: var(--electric-blue); text-shadow: 0 0 10px var(--electric-blue); }
 .char.incorrect { color: var(--neon-pink); background: rgba(255, 51, 204, 0.1); border-bottom: 2px solid var(--neon-pink); }

  #hiddenInput { position: absolute; opacity: 0; pointer-events: none; }

  /* Results Overlay Card [6, 7] */
 .results-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 0, 31, 0.98);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 30px;
    z-index: 50;
  }

 .wpm-result {
    font-size: 8rem;
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: 0 0 40px var(--neon-pink);
    margin: 0;
  }

 .main-btn {
    background: transparent;
    border: 2px solid var(--electric-blue);
    color: var(--electric-blue);
    padding: 15px 40px;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: bold;
    margin: 10px;
    transition: 0.3s;
  }
 .main-btn:hover { background: var(--electric-blue); color: var(--dark-navy); transform: scale(1.05); }
 .btn-telegram { border-color: #0088cc; color: #0088cc; }
 .btn-telegram:hover { background: #0088cc; color: white; }

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanlines"></div>

<div class="main-layout">
  <div class="branding-wrapper">
    <h1 class="main-title">Electronic Typing</h1>
    <div class="credit-text">by mrpanha</div>
  </div>

  <div class="bento-container">
    <div class="stats-hud">
      <div class="stat-card">
        <span class="stat-label">System Time</span>
        <span id="timer" class="stat-value">0S</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Neural Accuracy</span>
        <span id="accuracyLive" class="stat-value">100%</span>
      </div>
    </div>

    <div class="level-selector">
      <button class="lvl-btn active" onclick="changeLevel('easy', this)">Node: Easy</button>
      <button class="lvl-btn" onclick="changeLevel('medium', this)">Node: Medium</button>
      <button class="lvl-btn" onclick="changeLevel('hard', this)">Node: Hard</button>
      <button class="lvl-btn" onclick="changeLevel('veryHard', this)">Node: Elite</button>
    </div>

    <div id="wordDisplay">Initialising Link...</div>
    <input type="text" id="hiddenInput" autocomplete="off" spellcheck="false" autofocus>

    <div class="results-overlay" id="resultsOverlay">
      <span style="color: var(--electric-blue); letter-spacing: 5px;">UPLINK TERMINATED</span>
      <h1 class="wpm-result" id="wpmResult">0</h1>
      <p id="statsResult" style="color: var(--cyan-glow); letter-spacing: 2px;"></p>
      <div style="display: flex;">
        <button class="main-btn" onclick="resetGame()">Re-Initialize</button>
        <button class="main-btn btn-telegram" onclick="shareTelegram()">Broadcast Result</button>
      </div>
    </div>
  </div>
</div>

<script>
// Rule E: Standardized word corpora [8, 9, 10]
const levelConfig = {
  easy: { words: ["the", "his", "was", "for", "are", "one", "had", "word", "but", "what", "some", "can", "out", "all", "up", "use", "your", "how", "said", "an", "she", "do", "if", "will", "way", "big"], count: 25, time: 60 },
  medium: { words: ["system", "neural", "cyber", "grid", "data", "matrix", "core", "node", "access", "buffer", "stream", "packet", "proxy", "binary", "secure", "signal", "module", "logic", "flow", "unit", "sync", "link", "port", "disk", "chip"], count: 50, time: 110 },
  hard: { words: ["interface", "protocol", "encrypted", "mainframe", "velocity", "firewall", "terminal", "algorithm", "database", "sequence", "hardware", "software", "bandwidth", "frequency", "overload", "uplink", "bypass", "latency", "spectrum", "circuit", "decrypt", "backdoor", "payload", "compiler", "network"], count: 50, time: 110 },
  veryHard: { words: ["synchronization", "multidimensional", "cryptographic", "extraordinary", "vulnerability", "optimization", "infrastructure", "transmission", "parallelization", "authentication", "bioluminescence", "architecture", "decentralization", "neuroplasticity", "reconfiguration", "superconductivity", "microprocessor", "nanotechnology", "telecommunication", "interconnectivity"], count: 50, time: 110 }
};

let currentLevel = 'easy', timeLeft, timerId = null, testStarted = false, charIndex = 0, mistakes = 0, totalKeystrokes = 0, startTime = 0;
const wordDisplay = document.getElementById("wordDisplay"), hiddenInput = document.getElementById("hiddenInput"), timerDisplay = document.getElementById("timer"), accuracyDisplay = document.getElementById("accuracyLive"), resultsOverlay = document.getElementById("resultsOverlay");

function changeLevel(level, btn) {
  currentLevel = level;
  document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetGame();
}

function initWords() {
  wordDisplay.innerHTML = "";
  let fullText = "";
  const config = levelConfig[currentLevel];
  timeLeft = config.time;
  timerDisplay.innerText = timeLeft + "S";
  for (let i = 0; i < config.count; i++) fullText += config.words[Math.floor(Math.random() * config.words.length)] + (i === config.count - 1? "" : " ");
  
  fullText.split("").forEach(char => {
    const span = document.createElement("span");
    span.classList.add("char");
    span.innerText = char;
    wordDisplay.appendChild(span);
  });
  wordDisplay.querySelector(".char").classList.add("active");
  wordDisplay.scrollTop = 0;
  hiddenInput.focus();
}

function startTimer() {
  startTime = performance.now(); // Rule C: Monotonic High-Res [11]
  timerId = setInterval(() => {
    timeLeft--;
    timerDisplay.innerText = timeLeft + "S";
    if (timeLeft <= 0) endGame(); 
  }, 1000);
}

// Rule I: Dual Side-Cannon Celebration
function triggerSideCannons() {
  const count = 200;
  const defaults = { origin: { y: 0.7 }, zIndex: 1000 };
  function fire(particleRatio, opts) {
    confetti({...defaults,...opts, particleCount: Math.floor(count * particleRatio) });
  }
  fire(0.25, { spread: 26, startVelocity: 55, origin: { x: 0, y: 0.85 }, angle: 60, colors: ['#FF33CC', '#00CCFF'] });
  fire(0.25, { spread: 26, startVelocity: 55, origin: { x: 1, y: 0.85 }, angle: 120, colors: ['#FF33CC', '#00CCFF'] });
}

function endGame() {
  clearInterval(timerId);
  const timeInMinutes = (performance.now() - startTime) / 60000;
  
  // Standard Formula: (Characters Typed / 5) / Time
  const grossWPM = totalKeystrokes > 0? Math.round((totalKeystrokes / 5) / timeInMinutes) : 0;
  const accuracy = totalKeystrokes > 0? Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100) : 100;
  
  document.getElementById("wpmResult").innerText = grossWPM;
  document.getElementById("statsResult").innerText = `SYSTEM ACCURACY: ${accuracy}% | DATA ERRORS: ${mistakes}`;
  resultsOverlay.style.display = "flex";
  triggerSideCannons();
}

hiddenInput.addEventListener("input", (e) => {
  if (!e.isTrusted) return; // Anti-cheat measure [12]
  if (!testStarted) { testStarted = true; startTimer(); }

  const characters = wordDisplay.querySelectorAll(".char");
  const typedValue = hiddenInput.value;
  const typedChar = typedValue.charAt(typedValue.length - 1);
  const currentChar = characters[charIndex].innerText;

  // Real-time character validation
  if (typedChar === currentChar) {
    characters[charIndex].classList.add("correct");
  } else {
    characters[charIndex].classList.add("incorrect");
    mistakes++;
  }

  characters[charIndex].classList.remove("active");
  charIndex++; totalKeystrokes++;

  if (charIndex < characters.length) {
    const nextChar = characters[charIndex];
    nextChar.classList.add("active");
    // Rule G: Auto-scroll
    if (nextChar.offsetTop > (wordDisplay.scrollTop + wordDisplay.offsetHeight - 60)) {
        wordDisplay.scrollTop = nextChar.offsetTop - 60;
    }
  } else {
    // Rule B: Early Termination [13]
    endGame();
  }

  accuracyDisplay.innerText = Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100) + "%";
  hiddenInput.value = ""; // Keep buffer clear for per-char logic
});

// Rule F: Neural Data Distribution
function shareTelegram() {
  const wpm = document.getElementById("wpmResult").innerText;
  const acc = accuracyDisplay.innerText;
  const text = encodeURIComponent(`Electronic Typing [${currentLevel.toUpperCase()}]: ${wpm} WPM | ${acc} Accuracy! by mrpanha`);
  window.open(`https://t.me/share/url?url=${window.location.href}&text=${text}`, '_blank');
}

function resetGame() {
  clearInterval(timerId);
  charIndex = 0; mistakes = 0; totalKeystrokes = 0; testStarted = false;
  resultsOverlay.style.display = "none";
  accuracyDisplay.innerText = "100%";
  initWords();
}

document.addEventListener("click", () => { if(resultsOverlay.style.display!== "flex") hiddenInput.focus(); });
window.onload = initWords;
</script>
</body>
</html>
